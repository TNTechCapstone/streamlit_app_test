<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visor Connector</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: transparent;
      }

      .wrap {
        display: grid;
        gap: 0.6rem;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 0.75rem;
        padding: 0.75rem 1rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        color: #ffffff;
        background: #0f766e;
      }

      button.secondary {
        background: #475569;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .note {
        color: #475569;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <button id="connectButton" type="button">Connect Visor</button>
      <div class="note" id="note">Browser-side Bluetooth is idle.</div>
    </div>

    <script>
      const connectButton = document.getElementById("connectButton");
      const note = document.getElementById("note");

      let renderData = {
        serviceUuid: "",
        characteristicUuid: "",
        buttonLabel: "Connect Visor",
        expectedDeviceName: null,
        enableNotifications: false,
        pendingWriteToken: null,
        shotPayload: null,
      };

      let currentDevice = null;
      let currentServer = null;
      let currentService = null;
      let currentCharacteristic = null;
      let isConnecting = false;
      let lastProcessedWriteToken = null;
      const textDecoder = new TextDecoder("utf-8");

      function sendMessageToStreamlit(type, data) {
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type,
            ...data,
          },
          "*",
        );
      }

      function setComponentValue(value) {
        sendMessageToStreamlit("streamlit:setComponentValue", { value });
      }

      function setFrameHeight(height) {
        sendMessageToStreamlit("streamlit:setFrameHeight", { height });
      }

      function setComponentReady() {
        sendMessageToStreamlit("streamlit:componentReady", { apiVersion: 1 });
      }

      function emitEvent(payload) {
        setComponentValue({
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          ...payload,
        });
      }

      function refreshUi() {
        const connected =
          currentDevice &&
          currentDevice.gatt &&
          currentDevice.gatt.connected &&
          currentCharacteristic;

        connectButton.disabled = isConnecting;
        connectButton.textContent = connected ? "Disconnect Visor" : renderData.buttonLabel;
        connectButton.className = connected ? "secondary" : "";

        if (isConnecting) {
          note.textContent = "Opening Bluetooth chooser...";
        } else if (connected) {
          note.textContent = `Connected to ${currentDevice.name || "device"}.`;
        } else {
          note.textContent = "Browser-side Bluetooth is idle.";
        }

        setFrameHeight(document.body.scrollHeight);
      }

      function handleDisconnectEvent() {
        currentServer = null;
        currentService = null;
        currentCharacteristic = null;
        isConnecting = false;
        refreshUi();
        emitEvent({
          status: "disconnected",
          connected: false,
          deviceName: currentDevice ? currentDevice.name || "Unknown device" : null,
          lastEvent: "BLE device disconnected.",
          error: null,
        });
      }

      function handleCharacteristicValueChanged(event) {
        try {
          const view = event.target.value;
          const bytes = new Uint8Array(view.buffer, view.byteOffset, view.byteLength);
          const text = textDecoder.decode(bytes);
          const shotData = JSON.parse(text);

          emitEvent({
            status: "notification",
            connected: true,
            deviceName: currentDevice ? currentDevice.name || "Unknown device" : null,
            lastEvent: "Received shot notification from Pi.",
            shotData,
            error: null,
          });
        } catch (error) {
          emitEvent({
            status: "error",
            connected: !!(currentDevice && currentDevice.gatt && currentDevice.gatt.connected),
            deviceName: currentDevice ? currentDevice.name || "Unknown device" : null,
            lastEvent: "Failed to decode shot notification.",
            error: error && error.message ? error.message : String(error),
          });
        }
      }

      async function writeShotPayload() {
        if (!renderData.pendingWriteToken || renderData.pendingWriteToken === lastProcessedWriteToken) {
          return;
        }

        if (!currentCharacteristic || !currentDevice || !currentDevice.gatt || !currentDevice.gatt.connected) {
          emitEvent({
            status: "error",
            connected: false,
            deviceName: currentDevice ? currentDevice.name || "Unknown device" : null,
            lastEvent: "Shot send failed because the BLE device is not connected.",
            error: "No active BLE connection is available for writing.",
          });
          return;
        }

        try {
          const payload = Array.isArray(renderData.shotPayload) ? renderData.shotPayload : [];
          const data = Uint8Array.from(payload);

          if (typeof currentCharacteristic.writeValueWithoutResponse === "function") {
            await currentCharacteristic.writeValueWithoutResponse(data);
          } else {
            await currentCharacteristic.writeValue(data);
          }

          lastProcessedWriteToken = renderData.pendingWriteToken;

          emitEvent({
            status: "sent",
            connected: true,
            deviceName: currentDevice.name || "Unknown device",
            lastEvent: `Sent ${data.length} shot bytes to BLE device.`,
            error: null,
          });
        } catch (error) {
          emitEvent({
            status: "error",
            connected: !!(currentDevice && currentDevice.gatt && currentDevice.gatt.connected),
            deviceName: currentDevice ? currentDevice.name || "Unknown device" : null,
            lastEvent: "Shot send failed during BLE write.",
            error: error && error.message ? error.message : String(error),
          });
        }
      }

      async function connectToVisor() {
        if (!navigator.bluetooth) {
          emitEvent({
            status: "unsupported",
            connected: false,
            deviceName: null,
            lastEvent: "Web Bluetooth is not available in this browser.",
            error: "navigator.bluetooth is unavailable.",
          });
          return;
        }

        try {
          isConnecting = true;
          refreshUi();
          emitEvent({
            status: "connecting",
            connected: false,
            deviceName: null,
            lastEvent: "Waiting for visor selection...",
            error: null,
          });

          const filters = renderData.expectedDeviceName
            ? [{ name: renderData.expectedDeviceName, services: [renderData.serviceUuid] }]
            : [{ services: [renderData.serviceUuid] }];

          currentDevice = await navigator.bluetooth.requestDevice({ filters });

          currentDevice.removeEventListener("gattserverdisconnected", handleDisconnectEvent);
          currentDevice.addEventListener("gattserverdisconnected", handleDisconnectEvent);

          currentServer = await currentDevice.gatt.connect();
          currentService = await currentServer.getPrimaryService(renderData.serviceUuid);
          currentCharacteristic = await currentService.getCharacteristic(renderData.characteristicUuid);

          if (renderData.enableNotifications) {
            currentCharacteristic.removeEventListener("characteristicvaluechanged", handleCharacteristicValueChanged);
            currentCharacteristic.addEventListener("characteristicvaluechanged", handleCharacteristicValueChanged);
            await currentCharacteristic.startNotifications();
          }

          emitEvent({
            status: "connected",
            connected: true,
            deviceName: currentDevice.name || "Unknown device",
            lastEvent: renderData.enableNotifications
              ? "Connected and subscribed to shot notifications."
              : "Connected and opened BLE characteristic.",
            error: null,
          });
        } catch (error) {
          currentDevice = null;
          currentServer = null;
          currentService = null;
          currentCharacteristic = null;
          emitEvent({
            status: "error",
            connected: false,
            deviceName: currentDevice ? currentDevice.name || "Unknown device" : null,
            lastEvent: "BLE connection failed.",
            error: error && error.message ? error.message : String(error),
          });
        } finally {
          isConnecting = false;
          refreshUi();
        }
      }

      function disconnectFromVisor() {
        if (currentDevice && currentDevice.gatt && currentDevice.gatt.connected) {
          currentDevice.gatt.disconnect();
        } else {
          handleDisconnectEvent();
        }
      }

      connectButton.addEventListener("click", async () => {
        const connected =
          currentDevice &&
          currentDevice.gatt &&
          currentDevice.gatt.connected &&
          currentCharacteristic;

        if (connected) {
          disconnectFromVisor();
          return;
        }

        await connectToVisor();
      });

      window.addEventListener("message", (event) => {
        if (event.data.type !== "streamlit:render") {
          return;
        }

        renderData = {
          ...renderData,
          ...(event.data.args || {}),
        };

        connectButton.textContent = renderData.buttonLabel;
        refreshUi();
        writeShotPayload();
      });

      setComponentReady();
      refreshUi();
    </script>
  </body>
</html>
